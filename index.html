<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시간별 환율 추이 및 비교*</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f8f9fa;
            color: #333;
            -webkit-text-size-adjust: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin: 5px 0 15px 0;
            font-size: 18px;
            color: #111;
        }
        
        .comparison-wrapper {
            min-height: 70px; 
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .comparison-result {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            background-color: #e8f4fd;
            border-left: 4px solid #007AFF;
            font-size: 13px;
            font-weight: 600;
            color: #0056b3;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s;
            line-height: 1.5; 
        }
        .comparison-result.active {
            opacity: 1;
            visibility: visible;
        }

        .filter-container {
            margin-bottom: 15px;
            padding: 10px;
            background: #f1f3f5;
            border-radius: 8px;
        }
        .filter-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 12px;
            color: #495057;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            user-select: none;
            cursor: pointer;
            font-size: 12px;
            background: white;
            padding: 5px 10px;
            border: 1px solid #dee2e6;
            border-radius: 15px;
            transition: all 0.15s;
        }
        .checkbox-label:active {
            background: #e9ecef;
        }
        .checkbox-label input {
            margin-right: 4px;
            margin-top: 0;
            margin-bottom: 0;
        }
        
        .chart-box {
            position: relative;
            width: 100%;
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
            background: #fff;
            border: 1px solid #efefef;
            border-radius: 8px;
        }

        .chart-wrapper {
            position: relative;
            height: 50vh;
            min-height: 280px;
            max-height: 400px;
            width: 100%; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>시간별 환율 추이</h2>

</div>

    // 1. 데이터 파싱
    const datesSet = new Set();
    const hoursSet = new Set();
    
    Object.keys(rawData).forEach(key => {
        const [date, hour] = key.split(' ');
        if(date && hour) {
            datesSet.add(date);
            hoursSet.add(hour);
        }
    });

    const labelsDates = Array.from(datesSet).sort();
    const allHours = Array.from(hoursSet).sort();

    // 동적 너비 계산 (날짜 1개당 45px 확보)
    const baseWidth = document.getElementById('chartBox').clientWidth || 400;
    const dynamicWidth = Math.max(labelsDates.length * 15, baseWidth);
    document.getElementById('chartWrapper').style.width = dynamicWidth + 'px';

    // 2. 색상 팔레트
    const distinctColors = [
        '#007AFF', '#FF3B30', '#34C759', '#FF9500', '#AF52DE', 
        '#5AC8FA', '#FFCC00', '#FF2D55', '#5856D6', '#1ABC9C', '#E67E22', '#34495E'
    ];

    function getColorByIndex(index) {
        if (index < distinctColors.length) return distinctColors[index];
        const hue = (index * 137.5) % 360;
        return `hsl(${hue}, 85%, 50%)`;
    }

    // 3. 데이터셋 빌드
    const fullDatasets = allHours.map((hour, index) => {
        const color = getColorByIndex(index);
        const dataPoints = labelsDates.map(date => {
            const key = date + " " + hour;
            return rawData[key] !== undefined ? rawData[key] : null;
        });

        const backgroundColor = color.startsWith('hsl') ? color.replace('50%)', '50%, 0.1)') : color + '15';

        return {
            label: hour + '시',
            data: dataPoints,
            borderColor: color,
            backgroundColor: backgroundColor,
            borderWidth: 2,
            pointBackgroundColor: color,
            pointRadius: 3,
            tension: 0.1,
            spanGaps: true,
            originalHour: hour
        };
    });

    // 4. 체크박스 UI 동적 생성
    const filterGroup = document.getElementById('filterGroup');
    allHours.forEach(hour => {
        const label = document.createElement('label');
        label.className = 'checkbox-label';
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = hour;
        checkbox.checked = false;
        checkbox.addEventListener('change', updateChartAndComparison);
        
        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(hour + '시'));
        filterGroup.appendChild(label);
    });

    // 5. Chart.js 초기화
    const ctx = document.getElementById('exchangeChart').getContext('2d');
    let exchangeChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labelsDates,
            datasets: JSON.parse(JSON.stringify(fullDatasets))
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',     
                intersect: false   
            },
            // 🛠️ 터치 시 상단 박스를 건드리던 onHover 이벤트를 제거했습니다.
            scales: {
                y: { 
                    grace: '5%',
                    ticks: { font: { size: 10 } }
                },
                x: { 
                    ticks: { 
                        font: { size: 10 },
                        maxRotation: 90,
                        minRotation: 90,
                        autoSkip: false 
                    },
                }
            },
            plugins: {
                legend: {
                    position: 'top',
                    labels: { boxWidth: 10, padding: 8, font: { size: 11 } }
                },
                tooltip: {
                    itemSort: function(a, b) {
                        return a.datasetIndex - b.datasetIndex; 
                    },
                    callbacks: {
                        footer: function(context) {
                            const checkedBoxes = document.querySelectorAll('#filterGroup input:checked');
                            if (checkedBoxes.length !== 2) return '';

                            if (context.length === 2) {
                                const valA = context[0].parsed.y;
                                const valB = context[1].parsed.y;
                                const diff = (valB - valA).toFixed(2);
                                const absDiff = Math.round(Math.abs(diff) * 100);

                                if (diff > 0) {
                                    return `
▲ 차이: +${absDiff}틱 (${context[1].dataset.label}가 더 높음)`;
                                } else if (diff < 0) {
                                    return `
▼ 차이: -${absDiff}틱 (${context[0].dataset.label}가 더 높음)`;
                                } else {
                                    return `
- 두 시간대 환율 동일`;
                                }
                            }
                            return '';
                        }
                    }
                }
            }
        }
    });

    updateChartAndComparison();

    // 6. 업데이트 및 비교 로직 (전체 비교 + 최근 7개 비교 유지)
    function updateChartAndComparison() {
        const checkedHours = Array.from(document.querySelectorAll('#filterGroup input:checked'))
                                  .map(cb => cb.value);
        
        const filteredDatasets = fullDatasets.filter(ds => checkedHours.includes(ds.originalHour));
        exchangeChart.data.datasets = filteredDatasets;
        exchangeChart.update();

        const compBox = document.getElementById('comparisonBox');
        
        if (checkedHours.length === 2) {
            const hourA = checkedHours[0];
            const hourB = checkedHours[1];
            
            // [1] 전체 데이터 비교 변수
            let totalAWin = 0, totalBWin = 0, totalDraw = 0;

            // [2] 최근 7개 데이터 비교 변수
            let recentAWin = 0, recentBWin = 0, recentDraw = 0;
            const recent7Dates = labelsDates.slice(-7); 

            labelsDates.forEach(date => {
                const valA = rawData[`${date} ${hourA}`];
                const valB = rawData[`${date} ${hourB}`];

                if (valA !== undefined && valB !== undefined) {
                    if (valA > valB) totalAWin++;
                    else if (valB > valA) totalBWin++;
                    else totalDraw++;

                    if (recent7Dates.includes(date)) {
                        if (valA > valB) recentAWin++;
                        else if (valB > valA) recentBWin++;
                        else recentDraw++;
                    }
                }
            });

            // 문구 빌드: (1) 전체 비교 결과
            let totalResultText = `<strong>${hourA}시(${totalAWin}회)</strong> vs <strong>${hourB}시(${totalBWin}회)</strong> → `;
            if (totalAWin > totalBWin) totalResultText += `<strong>${hourA}시</strong> 우세`;
            else if (totalBWin > totalAWin) totalResultText += `<strong>${hourB}시</strong> 우세`;
            else totalResultText += `무승부`;
            if (totalDraw > 0) totalResultText += ` (동일 ${totalDraw})`;

            // 문구 빌드: (2) 최근 7개 비교 결과
            let recentResultText = `<strong>${hourA}시(${recentAWin}회)</strong> vs <strong>${hourB}시(${recentBWin}회)</strong> → `;
            if (recentAWin > recentBWin) recentResultText += `<strong>${hourA}시</strong> 우세`;
            else if (recentBWin > recentAWin) recentResultText += `<strong>${hourB}시</strong> 우세`;
            else recentResultText += `무승부`;
            if (recentDraw > 0) recentResultText += ` (동일 ${recentDraw})`;

            let finalMessage = `📊 <strong>전체 기간:</strong> ${totalResultText}<br>`;
            finalMessage += `⏱️ <strong>최근 7회:</strong> ${recentResultText}`;

            compBox.innerHTML = finalMessage;
            compBox.classList.add('active');
        } else {
            compBox.classList.remove('active');
        }
    }
</script>

</body>
</html>
