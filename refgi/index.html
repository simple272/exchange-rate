<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 냉장고</title>
    
    <!-- PWA 설정을 위한 매니페스트 -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%EC%9A%B0%EB%A6%AC%EC%A7%91%20%EB%83%89%EC%9E%A5%EA%B3%A0%22%2C%22short_name%22%3A%22%EB%83%89%EC%9E%A5%EA%B3%A0%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f3f4f6%22%2C%22theme_color%22%3A%22%232563eb%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F3159%2F3159614.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
    
    <!-- Tailwind CSS 및 아이콘 폰트 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .safe-touch { min-height: 48px; min-width: 48px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-12">

    <!-- 상단 헤더 -->
    <header class="bg-blue-600 text-white p-5 sticky top-0 shadow-md z-10 flex justify-between items-center">
        <h1 class="text-2xl font-bold">우리집 냉장고</h1>
        <button onclick="openModal()" class="bg-white text-blue-600 px-5 py-2 rounded-full font-bold text-lg shadow safe-touch">
            + 식품 추가
        </button>
    </header>

    <!-- 메인 식품 리스트 영역 -->
    <main class="max-w-md mx-auto p-4 space-y-4" id="food-list"></main>

    <!-- 텅 비었을 때 메시지 -->
    <div id="empty-msg" class="text-center py-20 text-gray-400 hidden">
        <i class="fa-solid fa-basket-shopping text-6xl mb-3 text-gray-300"></i>
        <p class="text-lg font-bold">냉장고가 비어있습니다.</p>
    </div>

    <!-- [1] 식품 입력 / 수정 모달창 -->
    <div id="food-modal" class="fixed inset-0 bg-black/50 z-40 flex items-end sm:items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-black mb-4">새 식품 등록</h2>
            <input type="hidden" id="edit-id">

            <!-- 카메라 영역 -->
            <div class="mb-4">
                <label class="block text-lg font-bold mb-1">식품 사진</label>
                <div class="relative bg-gray-200 rounded-2xl h-48 flex flex-col items-center justify-center overflow-hidden border-2 border-dashed border-gray-300">
                    <img id="photo-preview" class="w-full h-full object-cover hidden">
                    <video id="camera-stream" class="w-full h-full object-cover hidden" autoplay playsinline></video>
                    
                    <div id="camera-placeholder" class="text-center p-4">
                        <i class="fa-solid fa-camera text-4xl text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-500">사진을 촬영하거나 선택하세요</p>
                    </div>
                    <button id="shutter-btn" onclick="takeSnapshot()" class="absolute bottom-3 left-1/2 -translate-x-1/2 bg-red-600 text-white w-12 h-12 rounded-full hidden border-4 border-white shadow animate-bounce"></button>
                </div>
                <div class="flex gap-2 mt-2">
                    <button type="button" onclick="startCamera()" class="flex-1 bg-gray-600 text-white py-2.5 rounded-xl font-bold text-sm safe-touch"><i class="fa-solid fa-video mr-1"></i>카메라 켜기</button>
                    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(this)" class="hidden">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="flex-1 bg-gray-200 text-gray-700 py-2.5 rounded-xl font-bold text-sm safe-touch"><i class="fa-solid fa-image mr-1"></i>갤러리 선택</button>
                </div>
            </div>

            <!-- 입력 필드 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-lg font-bold mb-1">식품 이름 <span class="text-red-500">*</span></label>
                    <input type="text" id="food-name" placeholder="예: 우유, 계란" class="w-full border-2 border-gray-200 p-3 rounded-xl text-lg outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-lg font-bold mb-1">등록 시작일</label>
                        <input type="date" id="start-date" class="w-full border-2 border-gray-200 p-3 rounded-xl text-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-lg font-bold mb-1">소비/유통기한 <span class="text-red-500">*</span></label>
                        <input type="date" id="end-date" class="w-full border-2 border-gray-200 p-3 rounded-xl text-lg outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3.5 rounded-xl text-lg font-bold safe-touch">취소</button>
                <button onclick="saveFood()" class="flex-1 bg-blue-600 text-white py-3.5 rounded-xl text-lg font-bold safe-touch">저장하기</button>
            </div>
        </div>
    </div>

    <!-- [2] 긴급 만료 알림 모달창 -->
    <div id="urgent-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center">
            <div class="text-red-500 text-5xl mb-3"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h2 class="text-xl font-black mb-1">기한 임박·만료 알림</h2>
            <p class="text-gray-500 text-sm mb-4">빨리 먹어야 하는 식품이 있습니다!</p>
            <div id="urgent-list" class="bg-red-50 rounded-2xl p-4 mb-5 text-left text-sm text-red-900 space-y-1 max-h-40 overflow-y-auto"></div>
            <button onclick="closeUrgentModal()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-lg safe-touch">확인했습니다</button>
        </div>
    </div>

    <script>
        let foods = JSON.parse(localStorage.getItem('my-fridge-foods')) || [];
        let videoStream = null;

        window.onload = function() {
            renderFoods();
            checkUrgentFoods();
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e)%7B%7D);');
            }
        };

        // 실시간 화면 그리기 (글자 안 잘리도록 레이아웃 고정)
        function renderFoods() {
            const listContainer = document.getElementById('food-list');
            const emptyMsg = document.getElementById('empty-msg');
            listContainer.innerHTML = '';

            if (foods.length === 0) {
                emptyMsg.classList.remove('hidden');
                return;
            } else {
                emptyMsg.classList.add('hidden');
            }

            foods.sort((a, b) => new Date(a.endDate) - new Date(b.endDate));

            foods.forEach(food => {
                const today = new Date().toISOString().split('T')[0];
                const diffDays = Math.ceil((new Date(food.endDate) - new Date(today)) / (1000 * 60 * 60 * 24));
                
                let badgeColor = 'bg-blue-100 text-blue-700';
                let dDayText = `D-${diffDays}`;
                
                if (diffDays <= 3 && diffDays >= 0) {
                    badgeColor = 'bg-red-100 text-red-700 font-black animate-pulse';
                } else if (diffDays < 0) {
                    badgeColor = 'bg-slate-700 text-white';
                    dDayText = `기한지남 (${Math.abs(diffDays)}일)`;
                } else if (diffDays === 0) {
                    badgeColor = 'bg-red-600 text-white font-black';
                    dDayText = 'D-Day';
                }

                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-sm p-4 flex items-center gap-4 border border-gray-200';
                card.innerHTML = `
                    <div class="w-20 h-20 bg-gray-100 rounded-2xl overflow-hidden shrink-0 border border-gray-200">
                        ${food.photo ? `<img src="${food.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-300 text-2xl"><i class="fa-solid fa-utensils"></i></div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-2 mb-1">
                            <span class="text-xs font-bold px-2 py-0.5 rounded-md ${badgeColor}">${dDayText}</span>
                            <h3 class="text-lg font-bold text-gray-900 truncate">${food.name}</h3>
                        </div>
                        <p class="text-xs text-gray-400">등록일: ${food.startDate}</p>
                        <p class="text-xs text-red-600 font-bold">기한일: ${food.endDate}</p>
                    </div>
                    <div class="flex flex-col gap-1 shrink-0">
                        <button onclick="editFood('${food.id}')" class="text-gray-400 hover:text-blue-600 p-2 text-lg safe-touch" title="수정"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteFood('${food.id}')" class="text-gray-400 hover:text-red-600 p-2 text-lg safe-touch" title="삭제"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // 앱을 켰을 때 유통기한 경고창 팝업 로직
        function checkUrgentFoods() {
            const today = new Date(); today.setHours(0,0,0,0);
            // 만료 3일 전 이하 혹은 기한 지난 리스트 추출
            const urgent = foods.filter(f => {
                const diff = Math.ceil((new Date(f.endDate) - today) / (1000 * 60 * 60 * 24));
                return diff <= 3;
            });
            
            if (urgent.length > 0) {
                const listDiv = document.getElementById('urgent-list');
                listDiv.innerHTML = urgent.map(f => {
                    const diff = Math.ceil((new Date(f.endDate) - today) / (1000 * 60 * 60 * 24));
                    let text = diff < 0 ? `지남 (${Math.abs(diff)}일)` : diff === 0 ? '오늘만료' : `${diff}일 남음`;
                    return `<div class="py-1 border-b border-red-100 last:border-0">📌 <b>${f.name}</b> <span class="text-xs text-red-600">(${text})</span></div>`;
                }).join('');
                document.getElementById('urgent-modal').classList.remove('hidden');
            }
        }

        function closeUrgentModal() { document.getElementById('urgent-modal').classList.add('hidden'); }

        // 모달창 여닫기 및 데이터 리셋
        function openModal() {
            document.getElementById('food-modal').classList.remove('hidden');
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
        }

        function closeModal() {
            document.getElementById('food-modal').classList.add('hidden');
            stopCamera();
            document.getElementById('edit-id').value = '';
            document.getElementById('food-name').value = '';
            document.getElementById('end-date').value = '';
            document.getElementById('photo-preview').src = '';
            document.getElementById('photo-preview').classList.add('hidden');
            document.getElementById('camera-placeholder').classList.remove('hidden');
            document.getElementById('modal-title').innerText = '새 식품 등록';
        }

        // 카메라 구동 스크립트
        async function startCamera() {
            const video = document.getElementById('camera-stream');
            const placeholder = document.getElementById('camera-placeholder');
            const preview = document.getElementById('photo-preview');
            const shutterBtn = document.getElementById('shutter-btn');

            preview.classList.add('hidden');
            placeholder.classList.add('hidden');
            video.classList.remove('hidden');
            shutterBtn.classList.remove('hidden');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = videoStream;
            } catch (err) {
                alert('카메라 실행에 실패했습니다. 권한을 확인하거나 갤러리 선택을 이용해주세요.');
                stopCamera();
            }
        }

        function stopCamera() {
            const video = document.getElementById('camera-stream');
            const shutterBtn = document.getElementById('shutter-btn');
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            video.classList.add('hidden');
            shutterBtn.classList.add('hidden');
        }

        function takeSnapshot() {
            const video = document.getElementById('camera-stream');
            const preview = document.getElementById('photo-preview');
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 400; // 정방형 압축
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            preview.src = canvas.toDataURL('image/jpeg', 0.7);
            preview.classList.remove('hidden');
            stopCamera();
        }

        function handleFileSelect(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photo-preview');
                    document.getElementById('camera-placeholder').classList.add('hidden');
                    stopCamera();
                    
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = 400; canvas.height = 400;
                        canvas.getContext('2d').drawImage(img, 0, 0, 400, 400);
                        preview.src = canvas.toDataURL('image/jpeg', 0.7);
                        preview.classList.remove('hidden');
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 저장 (신규 등록 및 수정 완벽 지원)
        function saveFood() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('food-name').value.trim();
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const photoImg = document.getElementById('photo-preview');
            const photo = photoImg.classList.contains('hidden') ? '' : photoImg.src;

            if (!name) { alert('식품 이름을 입력해주세요.'); return; }
            if (!endDate) { alert('소비/유통기한을 선택해주세요.'); return; }

            if (id) {
                const index = foods.findIndex(f => f.id === id);
                if (index !== -1) foods[index] = { id, name, startDate, endDate, photo };
            } else {
                foods.push({ id: 'food_' + Date.now(), name, startDate, endDate, photo });
            }

            localStorage.setItem('my-fridge-foods', JSON.stringify(foods));
            renderFoods();
            closeModal();
        }

        // 수정 버튼 로직 연결
        function editFood(id) {
            const food = foods.find(f => f.id === id);
            if (!food) return;

            document.getElementById('edit-id').value = food.id;
            document.getElementById('food-name').value = food.name;
            document.getElementById('start-date').value = food.startDate;
            document.getElementById('end-date').value = food.endDate;
            
            if (food.photo) {
                const preview = document.getElementById('photo-preview');
                preview.src = food.photo;
                preview.classList.remove('hidden');
                document.getElementById('camera-placeholder').classList.add('hidden');
            }

            document.getElementById('modal-title').innerText = '식품 정보 수정';
            document.getElementById('food-modal').classList.remove('hidden');
        }

        // 삭제 버튼 로직 연결
        function deleteFood(id) {
            if (confirm('이 식품을 냉장고에서 꺼내시겠습니까 (삭제)?')) {
                foods = foods.filter(f => f.id !== id);
                localStorage.setItem('my-fridge-foods', JSON.stringify(foods));
                renderFoods();
            }
        }
    </script>
</body>
</html>
