<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 냉장고 관리</title>
    
    <!-- PWA 설정을 위한 매니페스트 (웹앱 설치 가능하게 함) -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%EC%9A%B0%EB%A6%AC%EC%A7%91%20%EB%83%89%EC%9E%A5%EA%B3%A0%22%2C%22short_name%22%3A%22%EB%83%89%EC%9E%A5%EA%B3%A0%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f3f4f6%22%2C%22theme_color%22%3A%22%232563eb%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F3159%2F3159614.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
    
    <!-- Tailwind CSS (디자인용) 및 FontAwesome (아이콘용) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 모든 연령층을 위해 기본 글자 크기를 키우고 터치 영역을 확보합니다 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .safe-touch { min-height: 48px; min-width: 48px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen pb-24">

    <!-- 상단 헤더 -->
    <header class="bg-blue-600 text-white p-5 sticky top-0 shadow-md z-10 flex justify-between items-center">
        <h1 class="text-2xl font-bold"><i class="fa-solid fa-refrigerator mr-2"></i>우리집 냉장고</h1>
        <button onclick="openModal()" class="bg-white text-blue-600 px-5 py-2 rounded-full font-bold text-lg shadow hover:bg-blue-50 safe-touch">
            <i class="fa-solid fa-plus mr-1"></i> 식품 추가
        </button>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="max-w-xl mx-auto p-4">
        <!-- 알림 허용 안내 배너 -->
        <div id="noti-banner" class="bg-yellow-100 border-l-4 border-yellow-500 p-4 mb-4 rounded shadow-sm hidden">
            <div class="flex justify-between items-center">
                <p class="text-sm text-yellow-700 font-medium">유통기한 알림을 받으시려면 알림 권한을 허용해주세요.</p>
                <button onclick="requestNotiPermission()" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm font-bold">허용하기</button>
            </div>
        </div>

        <!-- 식품 리스트 -->
        <div id="food-list" class="space-y-4">
            <!-- 자바스크립트로 아이템이 추가되는 공간 -->
        </div>

        <!-- 텅 비었을 때 메시지 -->
        <div id="empty-msg" class="text-center py-12 text-gray-500 hidden">
            <i class="fa-solid fa-basket-shopping text-6xl mb-3 text-gray-300"></i>
            <p class="text-xl">냉장고가 비어있습니다.<br>우측 상단의 추가 버튼을 눌러보세요!</p>
        </div>
    </main>

    <!-- 입력/수정 모달창 -->
    <div id="food-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold mb-4">새 식품 등록</h2>
            
            <input type="hidden" id="edit-id">

            <!-- 카메라 및 사진 미리보기 -->
            <div class="mb-4">
                <label class="block text-lg font-bold mb-1">식품 사진</label>
                <div class="relative bg-gray-200 rounded-xl h-48 flex flex-col items-center justify-center overflow-hidden border-2 border-dashed border-gray-400">
                    <img id="photo-preview" class="w-full h-full object-cover hidden">
                    <video id="camera-stream" class="w-full h-full object-cover hidden" autoplay playsinline></video>
                    
                    <div id="camera-placeholder" class="text-center p-4">
                        <i class="fa-solid fa-camera text-4xl text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-500">카메라로 촬영하거나 사진을 선택하세요</p>
                    </div>

                    <!-- 카메라 셔터 버튼 (스트리밍 중일 때만 보임) -->
                    <button id="shutter-btn" onclick="takeSnapshot()" class="absolute bottom-3 left-1/2 -translate-x-1/2 bg-red-600 text-white w-12 h-12 rounded-full hidden border-4 border-white shadow"></button>
                </div>
                
                <!-- 카메라 제어 버튼들 -->
                <div class="flex gap-2 mt-2">
                    <button type="button" onclick="startCamera()" class="flex-1 bg-gray-600 text-white py-2 rounded-lg font-bold safe-touch"><i class="fa-solid fa-video mr-1"></i>카메라 켜기</button>
                    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(this)" class="hidden">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-bold safe-touch"><i class="fa-solid fa-image mr-1"></i>갤러리 선택</button>
                </div>
            </div>

            <!-- 입력 폼 -->
            <div class="space-y-4">
                <div>
                    <label class="block text-lg font-bold mb-1">식품 이름 <span class="text-red-500">*</span></label>
                    <input type="text" id="food-name" placeholder="예: 우유, 계란" class="w-full border-2 border-gray-300 p-3 rounded-xl text-lg focus:border-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-lg font-bold mb-1">등록일(시작)</label>
                        <input type="date" id="start-date" class="w-full border-2 border-gray-300 p-3 rounded-xl text-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-lg font-bold mb-1">소비/유통기한 <span class="text-red-500">*</span></label>
                        <input type="date" id="end-date" class="w-full border-2 border-gray-300 p-3 rounded-xl text-lg focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <!-- 하단 버튼 -->
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl text-lg font-bold safe-touch">취소</button>
                <button onclick="saveFood()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl text-lg font-bold safe-touch">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        let foods = JSON.parse(localStorage.getItem('my-fridge-foods')) || [];
        let videoStream = null;

        // 초기 실행
        window.onload = function() {
            renderFoods();
            checkNotificationPermission();
            // 기본 날짜를 오늘로 설정
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
            
            // PWA를 위한 서비스 워커 등록
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e)%7B%7D);');
            }
        };

        // 알림 권한 체크 및 유통기한 확인
        function checkNotificationPermission() {
            if (!("Notification" in window)) return;
            if (Notification.permission === "granted") {
                checkExpirations();
            } else if (Notification.permission !== "denied") {
                document.getElementById('noti-banner').classList.remove('hidden');
            }
        }

        function requestNotiPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('noti-banner').classList.add('hidden');
                    checkExpirations();
                }
            });
        }

        // 10일, 5일, 3일, 2일, 1일 전 알림 체크 함수
        function checkExpirations() {
            const today = new Date();
            today.setHours(0,0,0,0);
            
            foods.forEach(food => {
                const end = new Date(food.endDate);
                end.setHours(0,0,0,0);
                const diffTime = end - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const targetDays = [10, 5, 3, 2, 1];
                if (targetDays.includes(diffDays)) {
                    // 유저에게 중복 알림 방지를 위해 세션스토리지 활용
                    const notiKey = `noti_${food.id}_${diffDays}`;
                    if (!sessionStorage.getItem(notiKey)) {
                        new Notification(`[냉장고 알림] 기한 임박!`, {
                            body: `'${food.name}'의 유통기한이 ${diffDays}일 남았습니다.`,
                            icon: food.photo || 'https://cdn-icons-png.flaticon.com/512/3159/3159614.png'
                        });
                        sessionStorage.setItem(notiKey, 'true');
                    }
                } else if (diffDays === 0) {
                    new Notification(`[냉장고 알림] 오늘 만료!`, { body: `'${food.name}'의 유통기한이 오늘까지입니다!`, icon: food.photo });
                } else if (diffDays < 0) {
                    new Notification(`[냉장고 알림] 기한 초과!`, { body: `'${food.name}'의 유통기한이 지났습니다. 확인해주세요.`, icon: food.photo });
                }
            });
        }

        // 화면에 식품 리스트 그리기
        function renderFoods() {
            const listContainer = document.getElementById('food-list');
            const emptyMsg = document.getElementById('empty-msg');
            listContainer.innerHTML = '';

            if (foods.length === 0) {
                emptyMsg.classList.remove('hidden');
                return;
            } else {
                emptyMsg.classList.add('hidden');
            }

            // 남은 일자 순으로 정렬 (급한 것 먼저 위로)
            foods.sort((a, b) => new Date(a.endDate) - new Date(b.endDate));

            foods.forEach(food => {
                const today = new Date().toISOString().split('T')[0];
                const diffDays = Math.ceil((new Date(food.endDate) - new Date(today)) / (1000 * 60 * 60 * 24));
                
                let badgeColor = 'bg-green-100 text-green-800';
                let dDayText = `D-${diffDays}`;
                
                if (diffDays <= 3 && diffDays >= 0) {
                    badgeColor = 'bg-red-100 text-red-800 animate-pulse';
                } else if (diffDays < 0) {
                    badgeColor = 'bg-gray-700 text-white';
                    dDayText = `기한지남 (${Math.abs(diffDays)}일)`;
                } else if (diffDays === 0) {
                    badgeColor = 'bg-red-600 text-white animate-pulse';
                    dDayText = 'D-Day';
                }

                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-sm p-4 flex items-center gap-4 border border-gray-200';
                card.innerHTML = `
                    <div class="w-20 h-20 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0 border">
                        ${food.photo ? `<img src="${food.photo}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-300 text-2xl"><i class="fa-solid fa-utensils"></i></div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-sm font-bold px-2 py-0.5 rounded-full ${badgeColor}">${dDayText}</span>
                            <h3 class="text-xl font-bold truncate text-gray-900">${food.name}</h3>
                        </div>
                        <p class="text-sm text-gray-500">등록일: ${food.startDate}</p>
                        <p class="text-sm text-red-600 font-medium">기한일: ${food.endDate}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="editFood('${food.id}')" class="text-gray-500 hover:text-blue-600 p-2 text-lg safe-touch" title="수정"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteFood('${food.id}')" class="text-gray-500 hover:text-red-600 p-2 text-lg safe-touch" title="삭제"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // 모달 열기/닫기
        function openModal() {
            document.getElementById('food-modal').classList.remove('hidden');
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];
        }

        function closeModal() {
            document.getElementById('food-modal').classList.add('hidden');
            stopCamera();
            // 폼 초기화
            document.getElementById('edit-id').value = '';
            document.getElementById('food-name').value = '';
            document.getElementById('end-date').value = '';
            document.getElementById('photo-preview').src = '';
            document.getElementById('photo-preview').classList.add('hidden');
            document.getElementById('camera-placeholder').classList.remove('hidden');
            document.getElementById('modal-title').innerText = '새 식품 등록';
        }

        // 카메라 작동 제어
        async function startCamera() {
            const video = document.getElementById('camera-stream');
            const placeholder = document.getElementById('camera-placeholder');
            const preview = document.getElementById('photo-preview');
            const shutterBtn = document.getElementById('shutter-btn');

            preview.classList.add('hidden');
            placeholder.classList.add('hidden');
            video.classList.remove('hidden');
            shutterBtn.classList.remove('hidden');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, // 후면 카메라 우선
                    audio: false 
                });
                video.srcObject = videoStream;
            } catch (err) {
                alert('카메라 접근 권한이 없거나 지원하지 않는 기기입니다.');
                stopCamera();
            }
        }

        function stopCamera() {
            const video = document.getElementById('camera-stream');
            const shutterBtn = document.getElementById('shutter-btn');
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            video.classList.add('hidden');
            shutterBtn.classList.add('hidden');
        }

        // 카메라 촬영 스냅샷 저장
        function takeSnapshot() {
            const video = document.getElementById('camera-stream');
            const preview = document.getElementById('photo-preview');
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 용량을 줄이기 위해 jpeg 및 0.7 압축률 적용
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            preview.src = dataUrl;
            
            preview.classList.remove('hidden');
            stopCamera();
        }

        // 갤러리에서 파일 선택 처리
        function handleFileSelect(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photo-preview');
                    document.getElementById('camera-placeholder').classList.add('hidden');
                    stopCamera();
                    
                    // 이미지 압축 알고리즘 (용량 초과 방지)
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const max_size = 400; // 최대 가로/세로 400px 크기로 압축해 용량 아낌
                        let width = img.width;
                        let height = img.height;
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        
                        preview.src = canvas.toDataURL('image/jpeg', 0.7);
                        preview.classList.remove('hidden');
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 식품 저장 (추가 및 수정 공용)
        function saveFood() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('food-name').value.trim();
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const photoImg = document.getElementById('photo-preview');
            const photo = photoImg.classList.contains('hidden') ? '' : photoImg.src;

            if (!name) { alert('식품 이름을 입력해주세요.'); return; }
            if (!endDate) { alert('소비/유통기한을 설정해주세요.'); return; }

            if (id) {
                // 수정 모드
                const index = foods.findIndex(f => f.id === id);
                if (index !== -1) {
                    foods[index] = { id, name, startDate, endDate, photo };
                }
            } else {
                // 신규 생성 모드
                const newFood = {
                    id: 'food_' + Date.now(),
                    name,
                    startDate,
                    endDate,
                    photo
                };
                foods.push(newFood);
            }

            localStorage.setItem('my-fridge-foods', JSON.stringify(foods));
            renderFoods();
            closeModal();
            checkExpirations(); // 새로고침 없이 알림 조건 업데이트
        }

        // 수정 버튼 클릭 시 데이터 폼 불러오기
        function editFood(id) {
            const food = foods.find(f => f.id === id);
            if (!food) return;

            document.getElementById('edit-id').value = food.id;
            document.getElementById('food-name').value = food.name;
            document.getElementById('start-date').value = food.startDate;
            document.getElementById('end-date').value = food.endDate;
            
            if (food.photo) {
                const preview = document.getElementById('photo-preview');
                preview.src = food.photo;
                preview.classList.remove('hidden');
                document.getElementById('camera-placeholder').classList.add('hidden');
            }

            document.getElementById('modal-title').innerText = '식품 정보 수정';
            document.getElementById('food-modal').classList.remove('hidden');
        }

        // 식품 삭제
        function deleteFood(id) {
            if (confirm('이 식품을 냉장고에서 꺼내시겠습니까(삭제)?')) {
                foods = foods.filter(f => f.id !== id);
                localStorage.setItem('my-fridge-foods', JSON.stringify(foods));
                renderFoods();
            }
        }
    </script>
</body>
</html>
