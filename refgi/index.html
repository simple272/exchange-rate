<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 냉장고</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 pb-10">

    <!-- 헤더 -->
    <header class="bg-blue-600 p-6 shadow-lg flex justify-between items-center text-white">
        <h1 class="text-2xl font-black tracking-tight">우리집 냉장고</h1>
        <button onclick="openModal()" class="bg-white text-blue-600 px-4 py-2 rounded-2xl font-bold shadow hover:scale-105 transition-transform">
            + 식품 추가
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4" id="food-list"></main>

    <!-- 긴급 알림 모달 (UI 개선) -->
    <div id="urgent-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in">
            <div class="text-red-500 text-5xl mb-4 text-center"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h2 class="text-xl font-black text-center mb-2">기한 임박 식품 알림</h2>
            <p class="text-gray-600 text-center mb-6">아래 식품들이 곧 유통기한이 만료되거나 지났습니다!</p>
            <div id="urgent-list" class="bg-red-50 rounded-2xl p-4 mb-6 text-sm text-red-800 space-y-2"></div>
            <button onclick="closeUrgentModal()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg">확인했습니다</button>
        </div>
    </div>

    <script>
        let foods = JSON.parse(localStorage.getItem('my-fridge-foods')) || [];

        // 앱 실행 시 알림 체크
        window.onload = function() {
            renderFoods();
            checkUrgentFoods();
        };

        function checkUrgentFoods() {
            const today = new Date(); today.setHours(0,0,0,0);
            const urgent = foods.filter(f => (new Date(f.endDate) - today) <= 0);
            
            if (urgent.length > 0) {
                const listDiv = document.getElementById('urgent-list');
                listDiv.innerHTML = urgent.map(f => `<div><strong>${f.name}</strong>: ${f.endDate}</div>`).join('');
                document.getElementById('urgent-modal').classList.remove('hidden');
            }
        }

        function closeUrgentModal() { document.getElementById('urgent-modal').classList.add('hidden'); }

        function renderFoods() {
            const listContainer = document.getElementById('food-list');
            listContainer.innerHTML = foods.length === 0 ? '<p class="text-center text-gray-400 mt-20">등록된 식품이 없습니다.</p>' : '';
            
            foods.sort((a,b) => new Date(a.endDate) - new Date(b.endDate)).forEach(food => {
                const diff = Math.ceil((new Date(food.endDate) - new Date()) / (1000*60*60*24));
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl border border-gray-100 shadow-sm flex items-center gap-4";
                card.innerHTML = `
                    <div class="w-20 h-20 rounded-2xl bg-gray-200 overflow-hidden shrink-0">
                        ${food.photo ? `<img src="${food.photo}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-utensils"></i></div>'}
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="inline-block px-2 py-0.5 rounded-lg text-xs font-bold ${diff < 0 ? 'bg-red-600 text-white' : 'bg-blue-100 text-blue-700'} mb-1">
                            ${diff < 0 ? '기한지남' : 'D-' + diff}
                        </span>
                        <h3 class="font-bold text-lg truncate">${food.name}</h3>
                        <p class="text-xs text-gray-500">기한: <span class="${diff < 0 ? 'text-red-500 font-bold' : ''}">${food.endDate}</span></p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="editFood('${food.id}')" class="p-2 text-gray-400 hover:text-blue-600"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deleteFood('${food.id}')" class="p-2 text-gray-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }
        // ... (이하 나머지 모달 로직 등은 기존과 동일)
    </script>
</body>
</html>
