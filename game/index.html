<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>피의 게임 데스매치 14x14 퍼즐 (WebRTC P2P)</title>
  
  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #121316;
      color: #f1f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 8px;
    }

    .p2p-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 350px;
      background: #1e2025;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2c2e33;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .p2p-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .p2p-panel input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #373a40;
      background: #121316;
      color: #fff;
      font-size: 12px;
    }
    .p2p-panel button {
      padding: 6px 12px;
      background: #00e5ff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
    }

    .my-role-badge {
      width: 100%;
      max-width: 350px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      padding: 6px;
      border-radius: 6px;
      background: #1e2025;
      border: 1px solid #373a40;
      margin-bottom: 8px;
      color: #909296;
    }

    .header-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 350px;
      margin-bottom: 8px;
    }
    .turn-badge {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 16px;
      background-color: #1e2025;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: all 0.2s ease;
    }
    .p1-turn { color: #ff5252; border: 2px solid #ff5252; }
    .p2-turn { color: #ffd600; border: 2px solid #ffd600; }

    .score-board {
      font-size: 12px;
      font-weight: bold;
      color: #ced4da;
      text-align: right;
    }

    .status-text {
      font-size: 12px;
      color: #909296;
      text-align: center;
      margin-bottom: 6px;
      height: 18px;
    }

    #board-container {
      position: relative;
      width: 350px;
      height: 350px;
      background: #181a1f;
      border: 3px solid #2c2e33;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
      touch-action: none;
    }

    .direction-label {
      position: absolute;
      font-weight: 800;
      font-size: 12px;
      color: #5c5f66;
      z-index: 1;
      pointer-events: none;
    }
    .dir-n { top: 1px; left: 50%; transform: translateX(-50%); }
    .dir-s { bottom: 1px; left: 50%; transform: translateX(-50%); }
    .dir-w { left: 2px; top: 50%; transform: translateY(-50%); }
    .dir-e { right: 2px; top: 50%; transform: translateY(-50%); }

    .grid-lines {
      position: absolute;
      width: 100%; height: 100%;
      background-size: 25px 25px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      border-radius: 6px;
    }

    .inner-zone {
      position: absolute;
      left: 100px; top: 100px;
      width: 150px; height: 150px;
      border: 2px dashed rgba(255, 140, 0, 0.5);
      pointer-events: none;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .move-target {
      position: absolute;
      width: 23px;
      height: 23px;
      border-radius: 50%;
      background-color: rgba(0, 229, 255, 0.4);
      border: 2px solid #00e5ff;
      cursor: pointer;
      z-index: 15;
      animation: pulse 1.2s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    .vehicle {
      position: absolute;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25), 0 2px 4px rgba(0,0,0,0.5);
      transition: left 0.15s ease-out, top 0.15s ease-out;
      cursor: pointer;
      z-index: 2;
    }
    .vehicle.selected {
      outline: 3px solid #00e5ff;
      outline-offset: -1px;
      z-index: 10 !important;
    }
    .vehicle.disabled-car {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .vehicle.last-moved::after {
      content: '★';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      color: #ffffff;
      text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 2px #000;
      pointer-events: none;
      z-index: 5;
    }

    .red { background-color: #e63946; }       
    .yellow { background-color: #ffb703; }    
    .silver { background-color: #6c757d; }    
    .bus { background-color: #457b9d; }       
    .block { 
      background-color: #f77f00; 
      border-radius: 2px; 
      cursor: not-allowed; 
      box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.3);
    } 

    .controls-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 350px;
      margin-top: 10px;
      gap: 8px;
    }

    .density-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: #1e2025;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2c2e33;
      font-size: 12px;
      color: #c1c2c5;
    }

    .density-control input[type=range] {
      width: 130px;
      accent-color: #00e5ff;
    }

    .action-row {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #373a40;
      font-weight: 600;
      font-size: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    .btn-reset {
      background: #25262b;
      color: #c1c2c5;
    }
    .btn-reset:hover:not(:disabled) {
      background: #2c2e33;
      color: #fff;
    }
    .btn-reset:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #222;
    }

    .btn-surrender {
      background: #3b1219;
      color: #ff6b6b;
      border-color: #5c1d28;
    }
    .btn-surrender:hover:not(:disabled) {
      background: #521822;
    }
    .btn-surrender:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #222;
    }
  </style>
</head>
<body>

  <!-- P2P 대전 상태 패널 -->
  <div class="p2p-panel">
    <div class="p2p-row">
      <span>내 ID:</span>
      <input type="text" id="my-peer-id" readonly placeholder="ID 생성 중...">
      <button onclick="copyMyId()">복사</button>
    </div>
    <div class="p2p-row">
      <input type="text" id="target-peer-id" placeholder="상대방 ID 입력">
      <button onclick="connectToPeer()">연결하기</button>
    </div>
  </div>

  <!-- 내 역할 안내 바 -->
  <div id="my-role-display" class="my-role-badge">상대방 연결을 기다리는 중...</div>

  <div class="header-panel">
    <div id="turn-display" class="turn-badge p1-turn">Player 1 (레드) 턴</div>
    <div id="score-display" class="score-board">탈출 | 🔴 0/4 vs 🟡 0/4</div>
  </div>

  <div id="status-info" class="status-text">연결 대기 중</div>

  <div id="board-container">
    <div class="grid-lines"></div>
    <div class="inner-zone"></div>
    <div class="direction-label dir-n">N</div>
    <div class="direction-label dir-s">S</div>
    <div class="direction-label dir-w">W</div>
    <div class="direction-label dir-e">E</div>
    <div id="board"></div>
  </div>

  <div class="controls-container">
    <div class="density-control">
      <span>외곽 중립차량 밀도</span>
      <input type="range" id="density-slider" min="1" max="5" value="3" oninput="updateDensityLabel()">
      <span id="density-val" style="font-weight: bold; color: #00e5ff;">보통 (24대)</span>
    </div>
    <div class="action-row">
      <button id="surrender-btn" class="btn btn-surrender" onclick="surrenderGame()" disabled>포기하기 (기권)</button>
      <button id="reset-btn" class="btn btn-reset" onclick="requestNewGame()" disabled>새 게임 시작</button>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // 1. PeerJS P2P 통신 서버 연결
    // -------------------------------------------------------------
    let peer = new Peer();
    let conn = null;
    let myPlayerRole = null; 
    let isGameActive = false;

    peer.on('open', (id) => {
      document.getElementById('my-peer-id').value = id;
    });

    peer.on('connection', (connection) => {
      conn = connection;
      myPlayerRole = 1;
      updateMyRoleBadge();
      setupConnectionListeners();
      document.getElementById('status-info').innerText = "🟢 상대방이 접속했습니다!";
      initGame(true, false);
    });

    function connectToPeer() {
      const targetId = document.getElementById('target-peer-id').value.trim();
      if (!targetId) return alert("상대방 ID를 입력하세요.");

      conn = peer.connect(targetId);
      myPlayerRole = 2;
      updateMyRoleBadge();

      conn.on('open', () => {
        setupConnectionListeners();
        document.getElementById('status-info').innerText = "🟢 상대방과 연결되었습니다!";
        sendDataToPeer({ type: 'REQ_SYNC' });
      });
    }

    function updateMyRoleBadge() {
      const badge = document.getElementById('my-role-display');
      if (myPlayerRole === 1) {
        badge.innerText = "내 역할: Player 1 (🔴 레드)";
        badge.style.color = "#ff5252";
        badge.style.borderColor = "#ff5252";
      } else if (myPlayerRole === 2) {
        badge.innerText = "내 역할: Player 2 (🟡 옐로우)";
        badge.style.color = "#ffd600";
        badge.style.borderColor = "#ffd600";
      }
    }

    function setupConnectionListeners() {
      if (!conn) return;

      conn.on('data', (data) => {
        if (data.type === 'SYNC') {
          gameState = data.gameState;
          currentTurn = data.currentTurn;
          lastMovedCarId = data.lastMovedCarId;
          redEscapedCount = data.redEscapedCount;
          yellowEscapedCount = data.yellowEscapedCount;
          isGameActive = data.isGameActive;

          selectedCarId = null;
          updateTurnDisplay();
          updateScoreDisplay();
          updateButtonStates();
          render();

          if (data.isNewGameNotify) {
            setTimeout(() => alert("🎮 상대방이 새 게임을 시작했습니다!"), 50);
          }
        } else if (data.type === 'REQ_SYNC' && myPlayerRole === 1) {
          broadcastGameState();
        } else if (data.type === 'SURRENDER') {
          isGameActive = false;
          updateButtonStates();
          const winner = data.surrenderedRole === 1 ? "Player 2 (옐로우)" : "Player 1 (레드)";
          alert(`🏳️ 상대방이 기권했습니다!
🎉 ${winner} 승리!`);
        }
      });

      conn.on('close', () => {
        alert("상대방과의 연결이 끊어졌습니다.");
        document.getElementById('status-info').innerText = "🔴 연결이 끊어졌습니다.";
        isGameActive = false;
        updateButtonStates();
      });
    }

    function sendDataToPeer(data) {
      if (conn && conn.open) {
        conn.send(data);
      }
    }

    function copyMyId() {
      const idInput = document.getElementById('my-peer-id');
      idInput.select();
      navigator.clipboard.writeText(idInput.value);
      alert("내 ID가 복사되었습니다! 상대방에게 전달하세요.");
    }

    function updateButtonStates() {
      const resetBtn = document.getElementById('reset-btn');
      const surrenderBtn = document.getElementById('surrender-btn');

      if (isGameActive) {
        resetBtn.disabled = true;
        surrenderBtn.disabled = false;
      } else {
        resetBtn.disabled = !conn || !conn.open;
        surrenderBtn.disabled = true;
      }
    }

    // -------------------------------------------------------------
    // 2. 게임 코어 및 완벽한 배치 검증 알고리즘
    // -------------------------------------------------------------
    const BOARD_SIZE = 14;
    const CELL_SIZE = 25; 

    let currentTurn = 1; 
    let selectedCarId = null;
    let lastMovedCarId = null; 
    let gameState = [];

    let redEscapedCount = 0;
    let yellowEscapedCount = 0;

    const fixedBlocks = [
      { id: 'b_n', x: 7, y: 0, len: 1, dir: 'H', type: 'block' },
      { id: 'b_s', x: 6, y: 13, len: 1, dir: 'H', type: 'block' },
      { id: 'b_w', x: 0, y: 6, len: 1, dir: 'H', type: 'block' },
      { id: 'b_e', x: 13, y: 7, len: 1, dir: 'H', type: 'block' }
    ];

    const densityMap = {
      1: { name: '매우 적음', silver: 8, bus: 4 },   
      2: { name: '적음', silver: 12, bus: 6 },       
      3: { name: '보통', silver: 16, bus: 8 },       
      4: { name: '많음', silver: 20, bus: 10 },      
      5: { name: '매우 많음', silver: 24, bus: 12 }   
    };

    function updateDensityLabel() {
      const val = document.getElementById('density-slider').value;
      const info = densityMap[val];
      const total = info.silver + info.bus;
      document.getElementById('density-val').innerText = `${info.name} (${total}대)`;
    }

    function createEmptyBoard() {
      return Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
    }

    function canPlace(board, x, y, len, dir, inInnerZoneOnly, outInnerZoneOnly) {
      for (let i = 0; i < len; i++) {
        const cx = dir === 'H' ? x + i : x;
        const cy = dir === 'V' ? y + i : y;

        if (cx < 0 || cx >= BOARD_SIZE || cy < 0 || cy >= BOARD_SIZE) return false;
        if (board[cy][cx] !== null) return false;

        const isInner = (cx >= 4 && cx <= 9 && cy >= 4 && cy <= 9);
        if (inInnerZoneOnly && !isInner) return false;
        if (outInnerZoneOnly && isInner) return false;
      }
      return true;
    }

    function placeOnBoard(board, id, x, y, len, dir) {
      for (let i = 0; i < len; i++) {
        const cx = dir === 'H' ? x + i : x;
        const cy = dir === 'V' ? y + i : y;
        board[cy][cx] = id;
      }
    }

    // 💡 강화된 억까 방지 검증 알고리즘 (빈 공간 수치 검사 및 고립 완벽 차단)
    function checkSpecialCarNotTrapped(layout, targetCar) {
      const grid = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
      layout.forEach(v => {
        for (let i = 0; i < v.len; i++) {
          const cx = v.dir === 'H' ? v.x + i : v.x;
          const cy = v.dir === 'V' ? v.y + i : v.y;
          if (cx >= 0 && cx < BOARD_SIZE && cy >= 0 && cy < BOARD_SIZE) {
            grid[cy][cx] = v;
          }
        }
      });

      let lineCells = [];
      if (targetCar.dir === 'H') {
        for (let x = 0; x < BOARD_SIZE; x++) lineCells.push(grid[targetCar.y][x]);
      } else {
        for (let y = 0; y < BOARD_SIZE; y++) lineCells.push(grid[y][targetCar.x]);
      }

      // 1. 해당 이동 라인에 빈 공간(Free Space)이 최소 3칸 이상 확보되어야 차를 우회시킬 수 있음
      const emptyCount = lineCells.filter(cell => cell === null).length;
      if (emptyCount < 3) return false;

      // 2. 고정 블록(주황색)에 의해 통로가 원천 봉쇄되어 있는지 검사
      const startIdx = targetCar.dir === 'H' ? targetCar.x : targetCar.y;
      const endIdx = startIdx + targetCar.len - 1;

      let negBlock = false;
      let posBlock = false;
      let negObstacles = 0;
      let posObstacles = 0;

      for (let i = startIdx - 1; i >= 0; i--) {
        if (lineCells[i] !== null) {
          if (lineCells[i].type === 'block') negBlock = true;
          negObstacles++;
        }
      }

      for (let i = endIdx + 1; i < BOARD_SIZE; i++) {
        if (lineCells[i] !== null) {
          if (lineCells[i].type === 'block') posBlock = true;
          posObstacles++;
        }
      }

      if (negBlock && posBlock) return false; // 양쪽 다 고정 블록으로 가로막힌 경우
      if (negObstacles >= 4 && posObstacles >= 4) return false; // 양쪽 다 여유 공간 없이 벽으로 막힌 경우

      return true;
    }

    function generateRandomLayout() {
      const densityLevel = document.getElementById('density-slider').value;
      const outerConfig = densityMap[densityLevel];

      let attempts = 0;
      while (attempts < 2000) {
        attempts++;
        const board = createEmptyBoard();
        const layout = [];

        fixedBlocks.forEach(b => {
          placeOnBoard(board, b.id, b.x, b.y, b.len, b.dir);
          layout.push({...b});
        });

        const innerVehicles = [
          ...Array(4).fill(null).map((_, i) => ({ id: `r_${i}`, len: 2, type: 'red' })),
          ...Array(4).fill(null).map((_, i) => ({ id: `y_${i}`, len: 2, type: 'yellow' }))
        ];

        const outerVehicles = [
          ...Array(outerConfig.silver).fill(null).map((_, i) => ({ id: `s_${i}`, len: 2, type: 'silver' })),
          ...Array(outerConfig.bus).fill(null).map((_, i) => ({ id: `b_${i}`, len: 3, type: 'bus' }))
        ];

        let success = true;

        for (let v of innerVehicles) {
          let placed = false;
          let trys = 0;
          while (!placed && trys < 120) {
            trys++;
            const dir = Math.random() < 0.5 ? 'H' : 'V';
            const x = Math.floor(Math.random() * 6) + 4;
            const y = Math.floor(Math.random() * 6) + 4;
            if (canPlace(board, x, y, v.len, dir, true, false)) {
              placeOnBoard(board, v.id, x, y, v.len, dir);
              layout.push({ ...v, x, y, dir });
              placed = true;
            }
          }
          if (!placed) { success = false; break; }
        }

        if (!success) continue;

        for (let v of outerVehicles) {
          let placed = false;
          let trys = 0;
          while (!placed && trys < 250) {
            trys++;
            const dir = Math.random() < 0.5 ? 'H' : 'V';
            const x = Math.floor(Math.random() * BOARD_SIZE);
            const y = Math.floor(Math.random() * BOARD_SIZE);
            if (canPlace(board, x, y, v.len, dir, false, true)) {
              placeOnBoard(board, v.id, x, y, v.len, dir);
              layout.push({ ...v, x, y, dir });
              placed = true;
            }
          }
          if (!placed) { success = false; break; }
        }

        if (!success) continue;

        const specials = layout.filter(item => item.type === 'red' || item.type === 'yellow');
        let allValid = true;
        for (let sv of specials) {
          if (!checkSpecialCarNotTrapped(layout, sv)) {
            allValid = false;
            break;
          }
        }

        if (allValid) return layout;
      }
      return null;
    }

    function requestNewGame() {
      if (!conn || !conn.open) return alert("상대방과 먼저 연결되어야 합니다.");
      initGame(true, true);
    }

    function surrenderGame() {
      if (!isGameActive) return;
      if (!confirm("정말로 기권(포기)하시겠습니까? 상대방의 승리로 처리됩니다.")) return;

      isGameActive = false;
      updateButtonStates();
      sendDataToPeer({
        type: 'SURRENDER',
        surrenderedRole: myPlayerRole
      });
      alert("기권하셨습니다. 상대방의 승리입니다.");
    }

    function broadcastGameState(isNewGameNotify = false) {
      sendDataToPeer({
        type: 'SYNC',
        gameState,
        currentTurn,
        lastMovedCarId,
        redEscapedCount,
        yellowEscapedCount,
        isGameActive,
        isNewGameNotify
      });
    }

    function initGame(shouldBroadCast = true, isNewGameNotify = false) {
      const layout = generateRandomLayout();
      if (!layout) {
        initGame(shouldBroadCast, isNewGameNotify);
        return;
      }
      gameState = layout;
      currentTurn = 1;
      selectedCarId = null;
      lastMovedCarId = null;
      redEscapedCount = 0;
      yellowEscapedCount = 0;
      isGameActive = true;

      updateTurnDisplay();
      updateScoreDisplay();
      updateButtonStates();
      render();

      if (shouldBroadCast) {
        broadcastGameState(isNewGameNotify);
      }
    }

    function getOccupiedGrid(excludeId) {
      const grid = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(false));
      gameState.forEach(obj => {
        if (obj.id === excludeId) return;
        for (let i = 0; i < obj.len; i++) {
          const cx = obj.dir === 'H' ? obj.x + i : obj.x;
          const cy = obj.dir === 'V' ? obj.y + i : obj.y;
          if (cx >= 0 && cx < BOARD_SIZE && cy >= 0 && cy < BOARD_SIZE) {
            grid[cy][cx] = true;
          }
        }
      });
      return grid;
    }

    function getValidMoveTargets(car) {
      const targets = [];
      if (!car) return targets;

      const grid = getOccupiedGrid(car.id);

      if (car.dir === 'H') {
        for (let nx = car.x - 1; nx >= 0; nx--) {
          if (grid[car.y][nx]) break;
          targets.push({ x: nx, y: car.y, side: 'head' });
        }
        for (let nx = car.x + 1; nx + car.len <= BOARD_SIZE; nx++) {
          if (grid[car.y][nx + car.len - 1]) break;
          targets.push({ x: nx, y: car.y, side: 'tail' });
        }
      } else {
        for (let ny = car.y - 1; ny >= 0; ny--) {
          if (grid[ny][car.x]) break;
          targets.push({ x: car.x, y: ny, side: 'head' });
        }
        for (let ny = car.y + 1; ny + car.len <= BOARD_SIZE; ny++) {
          if (grid[ny + car.len - 1][car.x]) break;
          targets.push({ x: car.x, y: ny, side: 'tail' });
        }
      }

      return targets;
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';

      gameState.forEach(item => {
        const el = document.createElement('div');
        el.classList.add('vehicle', item.type);
        
        if (item.id === selectedCarId) el.classList.add('selected');
        if (item.id === lastMovedCarId) el.classList.add('last-moved');

        const isOpponent = (currentTurn === 1 && item.type === 'yellow') || (currentTurn === 2 && item.type === 'red');
        const isLastMovedGrey = (item.id === lastMovedCarId && (item.type === 'silver' || item.type === 'bus'));

        if (isOpponent || isLastMovedGrey) {
          el.classList.add('disabled-car');
        }

        const width = item.dir === 'H' ? item.len * CELL_SIZE - 2 : CELL_SIZE - 2;
        const height = item.dir === 'V' ? item.len * CELL_SIZE - 2 : CELL_SIZE - 2;

        el.style.width = `${width}px`;
        el.style.height = `${height}px`;
        el.style.left = `${item.x * CELL_SIZE + 1}px`;
        el.style.top = `${item.y * CELL_SIZE + 1}px`;

        if (item.type !== 'block') {
          el.addEventListener('click', () => selectCar(item.id));
        }

        boardEl.appendChild(el);
      });

      if (selectedCarId) {
        const selectedCar = gameState.find(c => c.id === selectedCarId);
        const rawTargets = getValidMoveTargets(selectedCar);

        rawTargets.forEach(t => {
          const targetEl = document.createElement('div');
          targetEl.classList.add('move-target');

          let pointX = t.x;
          let pointY = t.y;

          if (selectedCar.dir === 'H') {
            if (t.side === 'tail') pointX = t.x + selectedCar.len - 1;
          } else {
            if (t.side === 'tail') pointY = t.y + selectedCar.len - 1;
          }

          targetEl.style.left = `${pointX * CELL_SIZE + 1}px`;
          targetEl.style.top = `${pointY * CELL_SIZE + 1}px`;

          targetEl.addEventListener('click', (e) => {
            e.stopPropagation();
            moveToTarget(selectedCar, t.x, t.y);
          });

          boardEl.appendChild(targetEl);
        });
      }
    }

    function selectCar(id) {
      if (!isGameActive) return;

      if (myPlayerRole && currentTurn !== myPlayerRole) {
        document.getElementById('status-info').innerText = "⚠️ 상대방 턴입니다. 기다려주세요!";
        return;
      }

      const car = gameState.find(c => c.id === id);
      const statusInfo = document.getElementById('status-info');

      if (currentTurn === 1 && car.type === 'yellow') {
        statusInfo.innerText = "⚠️ 상대방(노란색) 차량 선택 불가!";
        return;
      }
      if (currentTurn === 2 && car.type === 'red') {
        statusInfo.innerText = "⚠️ 상대방(빨간색) 차량 선택 불가!";
        return;
      }

      if (id === lastMovedCarId && (car.type === 'silver' || car.type === 'bus')) {
        statusInfo.innerText = "⚠️ 직전 턴 이동 회색차 선택 불가!";
        return;
      }

      selectedCarId = (selectedCarId === id) ? null : id;

      if (selectedCarId) {
        statusInfo.innerText = "이동할 위치(양 끝의 푸른 원)를 터치하세요";
      } else {
        statusInfo.innerText = "차량을 선택하세요";
      }
      render();
    }

    function isAtOuterEdge(car, x, y) {
      if (car.dir === 'H') {
        return (x === 0 || x + car.len === BOARD_SIZE);
      } else {
        return (y === 0 || y + car.len === BOARD_SIZE);
      }
    }

    function moveToTarget(car, targetX, targetY) {
      car.x = targetX;
      car.y = targetY;

      if ((car.type === 'red' || car.type === 'yellow') && isAtOuterEdge(car, targetX, targetY)) {
        gameState = gameState.filter(c => c.id !== car.id);
        
        if (car.type === 'red') redEscapedCount++;
        if (car.type === 'yellow') yellowEscapedCount++;

        lastMovedCarId = null;

        if (redEscapedCount >= 4) {
          isGameActive = false;
          alert("🎉 Player 1 (레드) 승리!");
        } else if (yellowEscapedCount >= 4) {
          isGameActive = false;
          alert("🎉 Player 2 (옐로우) 승리!");
        }
      } else {
        lastMovedCarId = car.id;
      }

      selectedCarId = null;
      currentTurn = currentTurn === 1 ? 2 : 1;

      updateTurnDisplay();
      updateScoreDisplay();
      updateButtonStates();
      render();

      broadcastGameState();
    }

    function updateTurnDisplay() {
      const display = document.getElementById('turn-display');
      if (currentTurn === 1) {
        display.innerText = "Player 1 (레드) 턴";
        display.className = "turn-badge p1-turn";
      } else {
        display.innerText = "Player 2 (옐로우) 턴";
        display.className = "turn-badge p2-turn";
      }
    }

    function updateScoreDisplay() {
      document.getElementById('score-display').innerText = `탈출 | 🔴 ${redEscapedCount}/4 vs 🟡 ${yellowEscapedCount}/4`;
    }

    updateDensityLabel();
  </script>
</body>
